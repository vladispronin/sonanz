[unix_http_server]
file=/app/var/run/supervisor.sock

[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/app/var/run/supervisord.pid

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///app/var/run/supervisor.sock

; --- Координация (1 воркер — намеренно, исключает гонку в allTracksHandled) ---
[program:sonanz-async]
command=php /app/bin/console messenger:consume async --time-limit=3600 --memory-limit=256M -vv
directory=/app
numprocs=1
process_name=%(program_name)s_%(process_num)02d
autostart=true
autorestart=true
startsecs=3
stopwaitsecs=300
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
