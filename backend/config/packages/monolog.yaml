monolog:
    handlers: {}

when@dev:
    monolog:
        handlers:
            app:
                type: rotating_file
                path: '%kernel.logs_dir%/app.log'
                level: debug
                max_files: 14
                channels: ['!event', '!doctrine']
            app_redis:
                type: redis
                redis:
                    id: Predis\Client
                    key_name: sonanz_logs
                level: info
                channels: ['!event', '!doctrine']
                formatter: monolog.formatter.json
            console:
                type: console
                process_psr_3_messages: false
                channels: ['!event', '!doctrine']

when@prod:
    monolog:
        handlers:
            app:
                type: redis
                redis:
                    id: Predis\Client
                    key_name: sonanz_logs
                level: info
                channels: ['!event', '!doctrine']
                formatter: monolog.formatter.json
