<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sonanz</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="app-center">
        <div class="brand">SONANZ</div>

        <div class="workspace">
          <div class="col-toggles">
            <span class="col-label">Тип медиа</span>
            <div class="toggle-group">
              <button class="toggle active" id="toggle-track">ТРЕК</button>
              <button class="toggle" id="toggle-album">АЛЬБОМ</button>
            </div>
          </div>

          <div class="col-inputs">
            <div class="field">
              <label for="author">Исполнитель</label>
              <input
                id="author"
                type="text"
                autocomplete="off"
                spellcheck="false"
              />
            </div>
            <div class="field">
              <label for="title" id="title-label">Трек</label>
              <input
                id="title"
                type="text"
                autocomplete="off"
                spellcheck="false"
              />
            </div>
          </div>

          <div class="col-actions">
            <button id="btn-meta" class="btn-meta">+ META</button>
            <button id="btn-start" class="btn-start">СТАРТ</button>
          </div>
        </div>

        <p id="error-msg"></p>
      </div>

      <aside id="jobs-panel">
        <div class="panel-header">
          <span class="panel-title">Загрузки</span>
          <span id="jobs-count" class="panel-count">0</span>
        </div>
        <div id="jobs-list"></div>
      </aside>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
