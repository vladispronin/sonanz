# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    App\Link\Infrastructure\Adapter\AudioSource\Youtube\YoutubeAudioSourceProvider:
        arguments:
            $youtubeApiKey: '%env(YOUTUBE_API_KEY)%'

    App\Link\Domain\Port\AudioSourceProviderInterface: '@App\Link\Infrastructure\Adapter\AudioSource\Youtube\YoutubeAudioSourceProvider'

    App\Link\Infrastructure\Adapter\AudioSource\ChainAudioSourceProvider:
        arguments:
            $providers:
                - '@App\Link\Infrastructure\Adapter\AudioSource\Youtube\YoutubeAudioSourceProvider'
                # - '@App\Link\Infrastructure\Adapter\AudioSource\YtDlp\YtDlpAudioSourceProvider'

    App\Download\Infrastructure\Adapter\AudioDownload\YtDlp\YtDlpAudioDownloadProvider:
        arguments:
            $ytDlpBin: '%env(YT_DLP_BIN)%'
            $denoBin: '%env(default::YT_DLP_DENO_BIN)%'
            $cookiesFile: '%env(default::YT_DLP_COOKIES_FILE)%'

    App\Download\Domain\Port\AudioDownloadProviderInterface: '@App\Download\Infrastructure\Adapter\AudioDownload\YtDlp\YtDlpAudioDownloadProvider'

    App\Download\Infrastructure\Adapter\AudioDownload\ChainAudioDownloadProvider:
        arguments:
            $providers:
                - '@App\Download\Infrastructure\Adapter\AudioDownload\YtDlp\YtDlpAudioDownloadProvider'
                # - '@App\Download\Infrastructure\Adapter\AudioDownload\Cobalt\CobaltAudioDownloadProvider'

    App\Tag\Infrastructure\Adapter\AcoustId\AcoustIdID3TagsProvider:
        arguments:
            $apiKey: '%env(ACOUSTID_API_KEY)%'

    App\Tag\Infrastructure\Adapter\ChainID3TagsProvider:
        arguments:
            $providers:
                - '@App\Tag\Infrastructure\Adapter\AcoustId\AcoustIdID3TagsProvider'
                - '@App\Tag\Infrastructure\Adapter\MusicBrainz\MusicBrainzID3TagsProvider'

    App\Tag\Domain\Port\ID3TagsProviderInterface: '@App\Tag\Infrastructure\Adapter\ChainID3TagsProvider'
    App\Tag\Domain\Port\FingerprintProviderInterface: '@App\Tag\Infrastructure\Adapter\Chromaprint\ChromaprintFingerprintProvider'
    App\Tag\Infrastructure\Adapter\CoverArtArchive\CoverArtArchiveProvider:
        arguments:
            $httpClient: '@coverart.http_client'

    App\Tag\Domain\Port\CoverArtProviderInterface: '@App\Tag\Infrastructure\Adapter\CoverArtArchive\CoverArtArchiveProvider'

    App\Shared\Infrastructure\Logging\CorrelationIdProcessor:
        tags:
            - { name: monolog.processor }

    Predis\Client:
        arguments:
            - '%env(REDIS_URL)%'
