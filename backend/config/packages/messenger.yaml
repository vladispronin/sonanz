framework:
    messenger:
        buses:
            messenger.bus.default:
                middleware:
                    - App\Shared\Infrastructure\Messenger\Middleware\LoggingMessengerMiddleware

        transports:
            # Для локального дебаггинга без RabbitMQ: раскомментировать sync-routing ниже
            # и закомментировать блок async/downloads/tagging/links
            sync: 'sync://'

            async:
                dsn: '%env(RABBITMQ_DSN)%'
                options:
                    exchange:
                        name: async
                        type: direct
                    queues:
                        async: ~
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2

            downloads:
                dsn: '%env(RABBITMQ_DSN)%'
                options:
                    exchange:
                        name: downloads
                        type: direct
                    queues:
                        downloads: ~
                retry_strategy:
                    max_retries: 2
                    delay: 5000
                    multiplier: 2

            tagging:
                dsn: '%env(RABBITMQ_DSN)%'
                options:
                    exchange:
                        name: tagging
                        type: direct
                    queues:
                        tagging: ~
                retry_strategy:
                    max_retries: 3
                    delay: 2000
                    multiplier: 2

            links:
                dsn: '%env(RABBITMQ_DSN)%'
                options:
                    exchange:
                        name: links
                        type: direct
                    queues:
                        links: ~
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2

        routing:
            # --- Для локального дебаггинга без брокера очередей ---
            App\Shared\Application\Message\CreateJobMessage: sync
            App\Shared\Application\Message\ArchiveAlbumMessage: sync
            App\Shared\Application\Message\LinkSearchMessage: sync
            App\Shared\Application\Message\TagAudioMessage: sync
            App\Shared\Application\Event\LinksFoundEvent: sync
            App\Shared\Application\Event\TrackCreatedEvent: sync
            App\Shared\Application\Event\JobFailedEvent: sync
            App\Shared\Application\Event\AudioDownloadedEvent: sync
            App\Shared\Application\Event\AudioTaggedEvent: sync
            App\Shared\Application\Event\AlbumArchivedEvent: sync
            App\Shared\Application\Event\TrackFailedEvent: sync

            # --- Асинхронные транспорты для прода ---
#            App\Shared\Application\Event\TrackCreatedEvent: downloads
#            App\Shared\Application\Message\TagAudioMessage: tagging
#            App\Shared\Application\Message\LinkSearchMessage: links
#            App\Shared\Application\Message\CreateJobMessage: async
#            App\Shared\Application\Message\ArchiveAlbumMessage: async
#            App\Shared\Application\Event\LinksFoundEvent: async
#            App\Shared\Application\Event\JobFailedEvent: async
#            App\Shared\Application\Event\AudioDownloadedEvent: async
#            App\Shared\Application\Event\AudioTaggedEvent: async
#            App\Shared\Application\Event\AlbumArchivedEvent: async
#            App\Shared\Application\Event\TrackFailedEvent: async

            # --- Синхронные транспорты для прода ---
            App\Shared\Application\Message\GetJobsMessage: sync
