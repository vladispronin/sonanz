[unix_http_server]
file=/app/var/run/supervisor.sock

[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/app/var/run/supervisord.pid

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///app/var/run/supervisor.sock

; --- Скачивание треков (параллельное yt-dlp) ---
[program:sonanz-downloads]
command=php /app/bin/console messenger:consume downloads --time-limit=3600 --memory-limit=512M -vv
directory=/app
numprocs=15
process_name=%(program_name)s_%(process_num)02d
autostart=true
autorestart=true
startsecs=3
stopwaitsecs=300
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
